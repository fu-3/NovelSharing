name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]   # main に push されたら実行
  workflow_dispatch:    # Actions タブから手動実行も可能

# Pages デプロイ + zip展開の commit に必要な権限
permissions:
  contents: write
  pages: write
  id-token: write

# 同時実行は最新のものだけを残す
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: サイトを生成（incoming/ の zip も自動展開）
        run: python build_site.py

      - name: 取り込んだ原稿を保存（zip を展開して commit、zip は削除）
        run: |
          # build_site.py が incoming/*.zip を episodes/ へ展開済み。
          # 展開結果を main に保存し、処理済み zip を消す。
          if ls incoming/*.zip >/dev/null 2>&1 || [ -n "$(git status --porcelain episodes)" ]; then
            rm -f incoming/*.zip
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A episodes incoming
            if ! git diff --cached --quiet; then
              git commit -m "原稿を取り込み（zip 展開）[skip ci]"
              git push
            fi
          fi

      - name: Pages 設定（未設定なら自動で有効化）
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: 成果物（public/）をアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages へデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
